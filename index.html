                    { label: "Ензимопатії", text: "PKU (фенілкетонурія), алкаптонурія, лейциноз — обов'язково знати дефектний фермент, маркер у сечі та специфічний запах (мишачий або кленового сиропу)." },
                    { label: "Токсикологія", text: "Ціаніди та Чадний газ блокують комплекс IV дихального ланцюга. Арсенати (миш'як) блокують ліпоєву кислоту." }
                ],
                backContent: [
                    { label: "Ензимодіагностика", text: "КФК-МВ (ізоформа креатинкінази) — маркер ураження серця; АлАТ — печінка; Амілаза — панкреатит." },
                    { label: "Гормони", text: "Адреналін працює через систему вторинних посередників (цАМФ); Глюкокортикоїди (кортизол) активно стимулюють глюконеогенез." }
                ]
            }
        ];

        function App() {
            // Алгоритм Фішера-Єйтса для рандомізації відповідей
            const deck = useMemo(() => {
                return rawCards.map(card => {
                    if (card.type === "test") {
                        const shuffledOptions = [...card.options];
                        const correctAnswer = shuffledOptions[card.correctIndex];
                        
                        for (let i = shuffledOptions.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
                        }
                        
                        return { 
                            ...card, 
                            options: shuffledOptions, 
                            correctIndex: shuffledOptions.indexOf(correctAnswer) 
                        };
                    }
                    return card;
                });
            }, []);

            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [answers, setAnswers] = useState({});

            const currentCard = deck[currentIndex];
            const selectedOption = answers[currentIndex];
            const isAnswered = selectedOption !== undefined;
            const isSummary = currentCard.type === "summary";
            
            // Якщо картка має зворотню сторону (тест або конспект з backContent)
            const hasBack = isSummary ? !!currentCard.backContent : true;

            const handleFlip = (e) => {
                e.stopPropagation();
                if (hasBack) setIsFlipped(!isFlipped);
            };

            const changeCard = (direction) => {
                setIsFlipped(false);
                setCurrentIndex((prev) => {
                    if (direction === 'next') return (prev + 1) % deck.length;
                    return (prev - 1 + deck.length) % deck.length;
                });
            };

            const handleSelect = (idx) => {
                if (!isAnswered && !isFlipped && !isSummary) {
                    setAnswers(prev => ({ ...prev, [currentIndex]: idx }));
                }
            };

            const renderQuestionText = (text) => {
                if (!isAnswered) {
                    return text.replace(/\[|\]/g, ''); 
                }
                const parts = text.split(/\[(.*?)\]/g);
                return parts.map((part, i) =>
                    i % 2 === 1 ? (
                        <span key={i} className="bg-yellow-200 text-yellow-900 px-1.5 py-0.5 rounded-md shadow-sm font-black mx-0.5">
                            {part}
                        </span>
                    ) : (
                        part
                    )
                );
            };

            return (
                <div className="fixed inset-0 bg-gray-50 flex flex-col px-5 sm:px-8 py-6 sm:py-10 font-sans select-none overflow-hidden text-slate-900">
                    <div className="w-full max-w-md mx-auto flex flex-col h-full">
                        
                        {/* Header */}
                        <div className="flex items-center justify-between shrink-0 mb-6 mt-1">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                                    <Icons.CustomLogo className="w-6 h-6" />
                                </div>
                                <div>
                                    <h1 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-tight mb-0.5">Метаболічні шляхи</h1>
                                    <p className="text-base text-gray-900 font-black tracking-tight">Біохімія малих молекул</p>
                                </div>
                            </div>
                            <div className="bg-white px-3 py-1.5 rounded-xl border border-gray-200 shadow-sm flex items-center gap-1.5">
                                <Icons.GraduationCap className="text-indigo-600 w-4 h-4" />
                                <span className="text-xs font-black text-gray-700">
                                    {currentIndex + 1} / {deck.length}
                                </span>
                            </div>
                        </div>

                        {/* 3D Card Area */}
                        <div className="relative flex-1 w-full [perspective:1500px] mb-5 min-h-0">
                            <div className={`card-inner ${isFlipped && hasBack ? 'is-flipped' : ''}`}>
                                
                                {/* FRONT FACE */}
                                <div className={`absolute inset-0 w-full h-full rounded-[32px] shadow-xl flex flex-col backface-hidden z-10 overflow-y-auto custom-scrollbar transition-colors duration-300 ${isSummary ? 'bg-indigo-600 text-white' : 'bg-white border border-gray-100'}`}>
                                    
                                    {!isSummary ? (
                                        <>
                                            <div className="p-6 pb-2 shrink-0">
                                                <div className="flex items-center justify-between mb-4 gap-2">
                                                    <span className="px-3 py-1.5 bg-indigo-50 text-indigo-700 text-[9px] sm:text-[10px] font-black uppercase tracking-widest rounded-lg border border-indigo-100/50 shadow-sm whitespace-nowrap">
                                                        {currentCard.freq}
                                                    </span>
                                                    <span className="px-3 py-1.5 bg-gray-50 text-gray-500 text-[8px] sm:text-[9px] font-black uppercase tracking-widest rounded-lg border border-gray-200 shadow-sm text-right">
                                                        {currentCard.src}
                                                    </span>
                                                </div>
                                                <h2 className="text-[17px] sm:text-[19px] font-bold leading-[1.45] text-gray-800">
                                                    {renderQuestionText(currentCard.question)}
                                                </h2>
                                            </div>

                                            <div className="flex-1 px-5 sm:px-6 pb-6 space-y-3">
                                                {currentCard.options.map((option, idx) => {
                                                    const isCorrect = idx === currentCard.correctIndex;
                                                    const isSelected = selectedOption === idx;
                                                    
                                                    let btnStyle = "border-gray-100 bg-gray-50 text-gray-700 hover:bg-gray-100";
                                                    let IconToShow = null;

                                                    if (isAnswered) {
                                                        if (isCorrect) {
                                                            btnStyle = "border-emerald-500 bg-emerald-50 text-emerald-700 ring-2 ring-emerald-100";
                                                            IconToShow = <Icons.CheckCircle2 className="w-5 h-5 text-emerald-500 shrink-0" />;
                                                        } else if (isSelected) {
                                                            btnStyle = "border-rose-500 bg-rose-50 text-rose-700 ring-2 ring-rose-100";
                                                            IconToShow = <Icons.XCircle className="w-5 h-5 text-rose-500 shrink-0" />;
                                                        } else {
                                                            btnStyle = "border-transparent bg-gray-50 text-gray-400 opacity-40";
                                                        }
                                                    }

                                                    return (
                                                        <button
                                                            key={idx}
                                                            onClick={() => handleSelect(idx)}
                                                            disabled={isAnswered}
                                                            className={`w-full text-left p-4 rounded-2xl border-2 transition-all duration-300 flex items-center justify-between touch-manipulation ${btnStyle} ${!isAnswered ? 'active:scale-[0.98]' : 'cursor-default'}`}
                                                        >
                                                            <span className="font-bold text-[14.5px] leading-tight pr-2">{option}</span>
                                                            {IconToShow}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </>
                                    ) : (
                                        <div className="p-6 flex flex-col min-h-full relative">
                                            {/* Індикатор того, що є зворотня сторона */}
                                            {hasBack && (
                                                <div className="absolute top-5 right-5 w-8 h-8 bg-white/20 rounded-full flex items-center justify-center animate-pulse">
                                                    <Icons.FlipHorizontal className="w-4 h-4 text-white" />
                                                </div>
                                            )}
                                            
                                            <div className="flex items-center justify-between mb-4 border-b border-white/20 pb-4 shrink-0">
                                                <div className="flex items-center gap-2">
                                                    <Icons.Pin className="w-4 h-4 text-indigo-200" />
                                                    <span className="text-[11px] uppercase tracking-widest font-black text-indigo-100">Підсумок блоку (1/2)</span>
                                                </div>
                                            </div>
                                            
                                            <div className="space-y-5 flex-1 mt-1">
                                                <h2 className="text-xl sm:text-2xl font-black text-white leading-tight mb-4 pr-6">
                                                    {currentCard.title}
                                                </h2>

                                                <div className="space-y-3.5">
                                                    {currentCard.content.map((item, i) => (
                                                        <section key={i} className="bg-white/10 rounded-3xl p-5 border border-white/10 backdrop-blur-md">
                                                            <h4 className="text-indigo-200 text-[10px] font-black uppercase tracking-[0.2em] mb-2.5">
                                                                {item.label}
                                                            </h4>
                                                            <p className="text-[14px] sm:text-[15px] font-medium leading-relaxed text-white/95">
                                                                {item.text}
                                                            </p>
                                                        </section>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* BACK FACE */}
                                <div className="absolute inset-0 w-full h-full bg-indigo-600 rounded-[32px] shadow-xl text-white [transform:rotateY(180deg)] backface-hidden overflow-y-auto custom-scrollbar flex flex-col z-0">
                                    {isSummary && currentCard.backContent ? (
                                        /* SUMMARY BACK */
                                        <div className="p-6 flex flex-col min-h-full">
                                            <div className="flex items-center justify-between mb-4 border-b border-white/20 pb-4 shrink-0">
                                                <div className="flex items-center gap-2">
                                                    <Icons.Pin className="w-4 h-4 text-indigo-200" />
                                                    <span className="text-[11px] uppercase tracking-widest font-black text-indigo-100">Продовження (2/2)</span>
                                                </div>
                                            </div>
                                            <div className="space-y-5 flex-1 mt-1">
                                                <div className="space-y-3.5">
                                                    {currentCard.backContent.map((item, i) => (
                                                        <section key={i} className="bg-white/10 rounded-3xl p-5 border border-white/10 backdrop-blur-md">
                                                            <h4 className="text-indigo-200 text-[10px] font-black uppercase tracking-[0.2em] mb-2.5">
                                                                {item.label}
                                                            </h4>
                                                            <p className="text-[14px] sm:text-[15px] font-medium leading-relaxed text-white/95">
                                                                {item.text}
                                                            </p>
                                                        </section>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ) : !isSummary ? (
                                        /* TEST BACK */
                                        <div className="p-6 flex flex-col min-h-full">
                                            <div className="flex items-center justify-between mb-4 border-b border-white/20 pb-4 shrink-0">
                                                <div className="flex items-center gap-2">
                                                    <Icons.BookOpen className="w-4 h-4 text-indigo-200" />
                                                    <span className="text-[11px] uppercase tracking-widest font-black text-indigo-100">Методичний розбір</span>
                                                </div>
                                                <Icons.Lightbulb className="w-5 h-5 text-yellow-300" />
                                            </div>
                                            
                                            <div className="space-y-5 flex-1 mt-1">
                                                <section>
                                                    <p className="text-[15.5px] sm:text-[16.5px] leading-relaxed font-medium text-indigo-50">
                                                        {currentCard.answer.logic}
                                                    </p>
                                                </section>

                                                <section className="bg-white/10 rounded-3xl p-5 border border-white/10 backdrop-blur-md">
                                                    <h4 className="text-indigo-200 text-[10px] font-black uppercase tracking-[0.2em] mb-4 text-center">Ключові тези для іспиту</h4>
                                                    <ul className="space-y-3.5">
                                                        {currentCard.answer.keyPoints.map((point, i) => (
                                                            <li key={i} className="flex gap-3.5 text-[13px] leading-snug">
                                                                <div className="flex-shrink-0 w-6 h-6 bg-white/20 rounded-lg flex items-center justify-center text-[10px] font-black">
                                                                    {i + 1}
                                                                </div>
                                                                <span className="font-medium text-white/90 mt-0.5">
                                                                    {point}
                                                                </span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </section>
                                            </div>
                                        </div>
                                    ) : null}
                                </div>

                            </div>
                        </div>

                        {/* Bottom Navigation Row */}
                        <div className="shrink-0 flex items-center justify-between gap-3 pb-safe">
                            <button 
                                onClick={() => changeCard('prev')}
                                className="flex items-center justify-center w-14 h-14 shrink-0 bg-white rounded-[20px] shadow-sm border border-gray-200 text-gray-500 active:bg-gray-100 active:scale-95 transition-all touch-manipulation"
                            >
                                <Icons.ChevronLeft className="w-7 h-7" />
                            </button>
                            
                            <button 
                                onClick={!hasBack ? null : handleFlip}
                                disabled={!hasBack}
                                className={`flex-1 h-14 rounded-[20px] font-black text-[11px] sm:text-xs uppercase tracking-[0.15em] flex items-center justify-center gap-2 transition-all touch-manipulation ${
                                    !hasBack 
                                    ? 'bg-indigo-100 text-indigo-300 cursor-not-allowed shadow-none' 
                                    : 'bg-indigo-600 text-white shadow-md shadow-indigo-200/50 active:scale-95'
                                }`}
                            >
                                <Icons.RotateCw className={`w-4 h-4 transition-transform duration-500 ${isFlipped ? 'rotate-180' : ''}`} />
                                Перегорнути
                            </button>

                            <button 
                                onClick={() => changeCard('next')}
                                className="flex items-center justify-center w-14 h-14 shrink-0 bg-white rounded-[20px] shadow-sm border border-gray-200 text-gray-500 active:bg-gray-100 active:scale-95 transition-all touch-manipulation"
                            >
                                <Icons.ChevronRight className="w-7 h-7" />
                            </button>
                        </div>

                        {/* Progress Bar */}
                        <div className="mt-4 shrink-0">
                            <div className="bg-gray-200 h-1.5 w-full rounded-full overflow-hidden">
                                <div 
                                    className="bg-indigo-600 h-full transition-all duration-300 ease-out"
                                    style={{ width: `${((currentIndex + 1) / deck.length) * 100}%` }}
                                />
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
