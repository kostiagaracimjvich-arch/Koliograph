            { id: 28, level: "Експертний рівень", source: "База ВНМУ", question: "До чого веде активація ФФК аміаком?", options: ["Алкалоз", "Лактат-ацидоз", "Кетони", "Блок", "Глікоген"], correctIndex: 1, answer: { logic: "Аміак тисне на 'газ' гліколізу.", conspectus: "Цукор горить швидко, мітохондрії стоять. Результат — мозок тоне в молочній кислоті.", keyPoints: ["Закислення мозку", "Лактат-ацидоз", "Кома"] }, },
            { id: 29, level: "Експертний рівень", source: "База ОНМедУ", question: "Як електрони НАДГ потрапляють в мітохондрії?", options: ["Карнітин", "Дифузія", "Малат-аспартатний човник", "Гліцеролфосфатний човник", "GLUT"], correctIndex: 2, answer: { logic: "НАДГ занадто великий для мембрани.", conspectus: "Нейрон використовує хімічний 'ліфт' (малат), щоб передати енергію всередину.", keyPoints: ["Човникові системи", "Малат-аспартат", "38 АТФ"] }, },
            { id: 30, level: "Експертний рівень", source: "Мед. Психологія", question: "Білок-тригер апоптозу з мітохондрій:", options: ["Гексокіназа", "Цитохром С", "АТФ-синтаза", "Каспаза-1", "Кальмодулін"], correctIndex: 1, answer: { logic: "Точка неповернення при смерті клітини.", conspectus: "Коли мітохондрія руйнується, Цитохром С виходить і вмикає програму самознищення.", keyPoints: ["Цитохром С", "Сигнал смерті", "Апоптоз нейрона"] }, }
        ];

        function App() {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [selectedOption, setSelectedOption] = useState(null);

            const currentCard = cards[currentIndex];

            const handleFlip = () => setIsFlipped(!isFlipped);
            const handleNext = () => { setIsFlipped(false); setSelectedOption(null); setCurrentIndex((prev) => (prev + 1) % cards.length); };
            const handlePrev = () => { setIsFlipped(false); setSelectedOption(null); setCurrentIndex((prev) => (prev - 1 + cards.length) % cards.length); };
            const handleSelect = (idx) => { if (!isFlipped) setSelectedOption(idx); };

            useEffect(() => { lucide.createIcons(); }, [currentIndex, isFlipped]);

            return (
                <div className="fixed inset-0 bg-gray-50 flex flex-col p-4 sm:p-6 overflow-hidden">
                    <div className="w-full max-w-md mx-auto flex flex-col h-full">
                        
                        {/* Header */}
                        <div className="flex items-center justify-between shrink-0 mb-4 mt-2">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                                    <i data-lucide="brain-circuit"></i>
                                </div>
                                <div>
                                    <h1 className="text-lg font-black text-gray-900">Flash-Doc Pro</h1>
                                    <p className="text-[10px] text-indigo-600 font-black uppercase tracking-widest">Енергетика мозку</p>
                                </div>
                            </div>
                            <div className="bg-white px-3 py-1.5 rounded-xl border border-gray-200 shadow-sm flex items-center gap-1.5">
                                <i data-lucide="graduation-cap" className="text-indigo-600 w-4 h-4"></i>
                                <span className="text-xs font-black text-gray-700">{currentIndex + 1} / {cards.length}</span>
                            </div>
                        </div>

                        {/* Card Area */}
                        <div className="relative flex-1 w-full [perspective:1500px] mb-4 min-h-0">
                            <div className={`card-inner ${isFlipped ? 'is-flipped' : ''}`}>
                                
                                {/* FRONT */}
                                <div className="absolute inset-0 w-full h-full bg-white rounded-[32px] shadow-xl border border-gray-100 flex flex-col backface-hidden z-10 overflow-y-auto custom-scrollbar">
                                    <div className="p-6 pb-2">
                                        <div className="flex items-center justify-between mb-4 gap-2">
                                            <span className="px-3 py-1.5 bg-indigo-50 text-indigo-700 text-[9px] font-black uppercase tracking-widest rounded-lg border border-indigo-100/50">
                                                {currentCard.level}
                                            </span>
                                            <span className="px-3 py-1.5 bg-gray-50 text-gray-500 text-[8px] font-black uppercase tracking-widest rounded-lg border border-gray-200 shadow-sm">
                                                {currentCard.source}
                                            </span>
                                        </div>
                                        <h2 className="text-lg sm:text-xl font-bold leading-snug text-gray-800">{currentCard.question}</h2>
                                    </div>
                                    <div className="flex-1 px-6 pb-6 space-y-2.5">
                                        {currentCard.options.map((opt, idx) => {
                                            const isCorrect = idx === currentCard.correctIndex;
                                            const isSelected = selectedOption === idx;
                                            let btnStyle = "border-gray-100 bg-gray-50 text-gray-700";
                                            if (isSelected) btnStyle = isCorrect ? "border-emerald-500 bg-emerald-50 text-emerald-700 ring-2 ring-emerald-100" : "border-rose-500 bg-rose-50 text-rose-700 ring-2 ring-rose-100";
                                            return (
                                                <button key={idx} onClick={() => handleSelect(idx)} className={`w-full text-left p-4 rounded-2xl border-2 transition-all flex items-center justify-between ${btnStyle}`}>
                                                    <span className="font-bold text-sm leading-tight">{opt}</span>
                                                    {isSelected && (isCorrect ? <i data-lucide="check-circle-2" className="text-emerald-500"></i> : <i data-lucide="x-circle" className="text-rose-500"></i>)}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* BACK */}
                                <div className="absolute inset-0 w-full h-full bg-indigo-600 rounded-[32px] shadow-xl text-white [transform:rotateY(180deg)] backface-hidden overflow-y-auto custom-scrollbar flex flex-col">
                                    <div className="p-6 flex flex-col min-h-full">
                                        <div className="flex items-center justify-between mb-4 border-b border-white/20 pb-4">
                                            <div className="flex items-center gap-2"><i data-lucide="book-open"></i><span className="text-[11px] uppercase tracking-widest font-black">Конспект</span></div>
                                            <i data-lucide="lightbulb" className="text-yellow-300"></i>
                                        </div>
                                        <div className="space-y-5 flex-1">
                                            <p className="text-base sm:text-lg leading-relaxed font-semibold italic text-indigo-50">{currentCard.answer.conspectus}</p>
                                            <div className="bg-white/10 rounded-3xl p-5 border border-white/10 backdrop-blur-md">
                                                <h4 className="text-indigo-200 text-[10px] font-black uppercase tracking-[0.2em] mb-4 text-center">Ключові тези</h4>
                                                <ul className="space-y-3.5">
                                                    {currentCard.answer.keyPoints.map((p, i) => (
                                                        <li key={i} className="flex gap-3 text-[13px] leading-snug">
                                                            <div className="flex-shrink-0 w-6 h-6 bg-white/20 rounded-lg flex items-center justify-center text-[10px] font-black">{i+1}</div>
                                                            <span className="font-medium">{p}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Navigation */}
                        <div className="shrink-0 flex items-center justify-between gap-2.5 pb-2">
                            <button onClick={handlePrev} className="w-14 h-14 bg-white rounded-[20px] shadow-sm border border-gray-200 text-gray-500 active:scale-95 transition-all flex items-center justify-center"><i data-lucide="chevron-left"></i></button>
                            <button onClick={handleFlip} className="flex-1 h-14 bg-indigo-600 text-white rounded-[20px] shadow-md font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all">
                                <i data-lucide="rotate-cw" className="w-4 h-4"></i>Перегорнути
                            </button>
                            <button onClick={handleNext} className="w-14 h-14 bg-white rounded-[20px] shadow-sm border border-gray-200 text-gray-500 active:scale-95 transition-all flex items-center justify-center"><i data-lucide="chevron-right"></i></button>
                        </div>

                        {/* Progress */}
                        <div className="mt-2 shrink-0">
                            <div className="bg-gray-200 h-1.5 w-full rounded-full overflow-hidden">
                                <div className="bg-indigo-600 h-full transition-all duration-300" style={{ width: `${((currentIndex + 1) / cards.length) * 100}%` }}></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
